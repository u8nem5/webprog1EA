<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Web programozás-1 Előadás Házi feladat | JavaScript CRUD Feladat</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>

<body>
    <header>
        <h1> <span class="homeicon">🏠</span> Web programozás-1 Előadás Házi feladat</h1>
    </header>
    <div id="wrapper">
        <aside id="nav">
            <nav>
                <ul>
                    <li><a href="index.html">Főoldal</a></li>
                    <li><a href="javascript.html">Javascript</a></li>
                    <li><a href="oojs.html">OOJS</a></li>
                    <li class="active"><a href="fetchapi.html">FETCHAPI</a></li>
                </ul>
            </nav>
        </aside>
        <div id="content">
            <h1>JavaScript CRUD Feladat</h1>
            <hr>
            <div id="ship-form">
                <form onsubmit="event.preventDefault();onFormSubmit();">
                    <div>
                        <label>Hajó Neve:*</label><label class="validation-error hide" id="nameValidationError">Kötelező megadni.</label>
                        <input type="text" name="name" id="name">
                    </div>  
                    <div>
                        <label>
                            Típus:
                            <select id="type">
                              <option value="">- Válassz típust -</option>
                              <option value="személyhajó">személyhajó</option>
                              <option value="komp">komp</option>
                              <option value="kisgéphajó">kisgéphajó</option>
                              <option value="szolgálati hajó">szolgálati hajó</option>
                              <option value="önjáró uszály">önjáró uszály</option>
                              <option value="uszály">uszály</option>
                              <option value="vitorlás">vitorlás</option>
                              <option value="halászhajó">halászhajó</option>
                              <option value="úszó munkagép">úszó munkagép</option>
                            </select>   
                          </label>  
                    </div>
                    <div>
                        <label>
                            Üzemel:
                            <input type="checkbox" id="active" />
                          </label>
                    </div>
                    <div class="form-action-buttons">
                        <input type="submit" value="Mentés">
                    </div>
                </form>
            </div>
            <br />
            <div class="ship-table">
                <table class="list" id="shipList">
                    <thead>
                        <tr>
                            <th>Hajó Neve</th>
                            <th>Típus</th>
                            <th>Üzemel</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
            <script src="js/fetchapi.js"></script>
        </div>
    </div>
    <footer>
        Készítette: FWNQJF, U8NEM5
    </footer>
</body>

</html>
